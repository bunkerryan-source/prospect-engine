# ============================================================
# PROSPECT ENGINE CONFIGURATION
# ============================================================

# --- ICP Firmographic Filters ---
icp:
  revenue_min: 5000000
  revenue_max: 500000000
  employee_min: 25
  employee_max: 2000

# --- Named State Lists ---
state_lists:
  south_central:
    default: true
    states: [TX, LA, AR, OK]
  southeast:
    states: [FL, GA, NC, SC, TN, AL, MS]
  northeast:
    states: [NJ, NY, PA, CT, MA, MD, VA]
  midwest:
    states: [OH, IL, IN, MI, WI, MN, MO, IA]
  west:
    states: [CA, WA, OR, AZ, CO, NV, UT]

# --- Verticals ---
# TRIMMED: 2 keywords per vertical to reduce SerpAPI usage.
# Queries are "{keyword} {state}" so be specific enough to find
# actual manufacturers, not articles.
verticals:
  fragrance:
    keywords:
      - fragrance manufacturer
      - candle manufacturer
    naics_codes: ["325611", "325620", "325998"]
    sqep_product_signals: [candle, air freshener, home fragrance]

  flavor:
    keywords:
      - flavor manufacturer
      - seasoning manufacturer
    naics_codes: ["311942", "311999"]
    sqep_product_signals: [seasoning, flavoring, spice]

  food:
    keywords:
      - food manufacturer
      - food processor
    naics_codes: ["3111", "3112", "3113", "3114", "3115", "3116", "3117", "3118", "3119"]
    sqep_product_signals: [snack, beverage, condiment, frozen]

  pharma:
    keywords:
      - pharmaceutical manufacturer
      - CDMO
    naics_codes: ["325411", "325412", "325413", "325414"]
    sqep_product_signals: [OTC, pharmaceutical]

  nutraceutical:
    keywords:
      - supplement manufacturer
      - nutraceutical manufacturer
    naics_codes: ["311514", "325411", "325199"]
    sqep_product_signals: [vitamin, supplement, probiotic]

# --- SQEP Search Terms ---
# TRIMMED: 2 terms (was 5). These find companies with Walmart compliance pain.
sqep_search_terms:
  - "Walmart SQEP supplier"
  - "Walmart OTIF fine supplier"

# --- Import Keywords ---
# TRIMMED: 1 keyword per vertical (was 3).
import_keywords:
  fragrance: [fragrance compound]
  flavor: [flavor extract]
  food: [food ingredient]
  pharma: [pharmaceutical ingredient]
  nutraceutical: [dietary supplement ingredient]

# --- Search API ---
search_api:
  provider: "serpapi"
  plan_limit: 1000

# --- Apollo.io ---
apollo:
  enabled: true
  per_page: 25
  max_pages_per_search: 4
  plan_limit: 30000

# --- Hunter.io ---
hunter:
  enabled: true
  max_searches_per_run: 100
  max_verifications_per_run: 50
  search_credit_limit: 1000
  verification_credit_limit: 1000

# --- Lead Scoring ---
scoring:
  signal_density:
    1_source: 5
    2_sources: 15
    3_sources: 25
    4_plus_sources: 35
  compliance:
    walmart_supplier: 10
    sqep_mentioned: 10
    otif_mentioned: 10
    compliance_pain: 10
  geography:
    in_target_state: 15
    other: 0
  enrichment:
    verified_email_logistics_title: 15
    email_non_logistics_title: 10
    email_pattern_found: 5
    contact_name_no_email: 3
    website_only: 0
  vertical_multipliers:
    food: 1.3
    fragrance: 1.2
    nutraceutical: 1.15
    pharma: 1.1
    flavor: 1.0
    unknown: 0.8
  tiers:
    hot: 70
    warm: 45
    nurture: 25

# --- Database ---
database:
  path: "./prospects.db"
  statuses: [NEW, QUEUED, CONTACTED, ENGAGED, QUOTED, WON, LOST, PARKED]

# --- Checkpoints ---
checkpoints:
  directory: "./checkpoints"
  keep_on_success: false

# --- Blocked Domains ---
# Add domains here as you spot noise in reports. These are merged with the
# built-in blocklist in domain_filter.py. Just the bare domain — no http://.
blocked_domains:
  # - somespamsite.com
  # - anothernoisedomain.org

# --- Output ---
output:
  directory: "./output"
  filename_prefix: "prospects"
  formats: [xlsx, csv]
